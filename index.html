<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagrama general del sistema SENTIA</title>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#f3f4f6;
      color:#222;
    }
    .wrap{
      max-width:1600px;
      margin:24px auto;
      padding:24px;
    }
    .card{
      background:#fff;
      border:1px solid #ddd;
      box-shadow:0 4px 18px rgba(0,0,0,.08);
      padding:20px;
    }
    h1{
      margin:0 0 12px 0;
      font-size:28px;
    }
    p{
      margin:0 0 16px 0;
      font-size:16px;
      line-height:1.4;
    }
    img{
      display:block;
      width:100%;
      height:auto;
      background:#fff;
    }
    .small{
      margin-top:12px;
      font-size:14px;
      color:#555;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Diagrama general del sistema SENTIA</h1>
      <p>Amplía con el zoom del navegador para leer el texto sin pérdida de nitidez.</p>
      <img src="SENTIA Multi-Agent-2026-04-08-212711.svg" alt="Diagrama general del sistema SENTIA">
      <div class="small">Versión web en SVG para consulta ampliada.</div>
    </div>
  </div>
</body>
</html>
